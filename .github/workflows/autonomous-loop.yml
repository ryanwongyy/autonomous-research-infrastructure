name: Autonomous Pipeline Loop

on:
  schedule:
    # Morning: generate + review + promote
    - cron: '0 8 * * *'
    # Afternoon: tournament + promote
    - cron: '0 14 * * *'
    # Evening: generate + review + promote
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: 'Papers to generate per run'
        required: false
        default: '2'
      skip_generate:
        description: 'Skip paper generation (tournament/promote only)'
        required: false
        default: 'false'

env:
  API_BASE: https://ari-backend-w2ne.onrender.com
  API_KEY: ${{ secrets.ARI_ADMIN_KEY }}

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Wake up Render
        run: |
          echo "Pinging health endpoint to wake Render from cold start..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_BASE/health" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "503" ]; then
              echo "Server is awake"
              break
            fi
            sleep 10
          done
          # Final check
          curl -sf "$API_BASE/health" || { echo "Server failed to wake up"; exit 1; }

      - name: Reap orphan papers from prior runs
        run: |
          # PR #60: detect papers stuck at non-terminal status with stale
          # heartbeats and flip them to status=killed. Catches the case
          # where the Render worker was killed mid-stage and PR #46/48's
          # in-process cleanup never ran (paper apep_f237bfc0 is the
          # canonical example: 3-min heartbeat then 42-min silence,
          # workflow timed out, paper stayed status=draft forever).
          #
          # Threshold 30 min: Drafter is the longest legitimate stage at
          # 15 min so 30 min gives 2x safety margin. Won't false-reap
          # in-flight papers from a concurrent workflow.
          #
          # Failure here is non-fatal — log and continue so a transient
          # reaper error doesn't block the rest of the cron.
          echo "Reaping any orphan papers from prior runs..."
          REAP=$(curl -s -X POST "$API_BASE/api/v1/admin/papers/reap-orphans?stale_minutes=30" \
            -H "X-API-Key: $API_KEY" --max-time 60) || REAP="{}"
          echo "$REAP" | python3 -m json.tool 2>/dev/null || echo "$REAP"
          REAPED=$(echo "$REAP" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("reaped_count", 0))' 2>/dev/null || echo "?")
          echo "Reaped $REAPED orphan paper(s)" >> "$GITHUB_STEP_SUMMARY"

      - name: Determine schedule context
        id: context
        run: |
          HOUR=$(date -u +%H)
          echo "Current UTC hour: $HOUR"
          # Afternoon run (14:00) is tournament-focused
          if [ "$HOUR" = "14" ]; then
            echo "run_tournament=true" >> "$GITHUB_OUTPUT"
            echo "run_generate=false" >> "$GITHUB_OUTPUT"
          else
            echo "run_tournament=false" >> "$GITHUB_OUTPUT"
            echo "run_generate=true" >> "$GITHUB_OUTPUT"
          fi
          # Manual dispatch overrides
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.skip_generate }}" = "true" ]; then
              echo "run_generate=false" >> "$GITHUB_OUTPUT"
            else
              echo "run_generate=true" >> "$GITHUB_OUTPUT"
            fi
            echo "run_tournament=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate papers (fire-and-poll)
        if: steps.context.outputs.run_generate == 'true'
        run: |
          COUNT="${{ inputs.count || '2' }}"
          echo "Spawning $COUNT paper-generation tasks..."
          # POST returns immediately with paper_ids. The actual pipeline
          # runs as a background task on the backend, so we poll
          # GET /papers/{id} for status changes instead of holding the
          # HTTP request open. This sidesteps Render's ~15-min request
          # limit (production runs #25145786347 and #25146400252 hit
          # this exact wall on the streaming endpoint).
          RESPONSE=$(curl -sf -X POST "$API_BASE/api/v1/batch/generate-async" \
            -H "X-API-Key: $API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"count\": $COUNT}" \
            --max-time 60) || { echo "::error::POST /batch/generate-async failed"; exit 1; }
          echo "$RESPONSE" | python3 -m json.tool
          PAPER_IDS=$(echo "$RESPONSE" | python3 -c 'import sys,json; print(" ".join(json.load(sys.stdin)["paper_ids"]))')
          echo "Polling paper IDs: $PAPER_IDS"
          # Poll each paper every 30s until it reaches a terminal
          # status. 45-min budget; the per-paper poll requests are
          # tiny so they don't hit Render's 15-min request cap.
          DEADLINE=$(($(date +%s) + 2700))
          ALL_DONE=false
          while [ $(date +%s) -lt $DEADLINE ]; do
            ALL_DONE=true
            for PID in $PAPER_IDS; do
              STATUS=$(curl -sf "$API_BASE/api/v1/papers/$PID" \
                -H "X-API-Key: $API_KEY" 2>/dev/null \
                | python3 -c 'import sys,json; print(json.load(sys.stdin).get("status",""))' \
                2>/dev/null || echo "")
              echo "  $PID: $STATUS"
              # Terminal: candidate (success), error, killed, rejected
              case "$STATUS" in
                candidate|published|error|killed|rejected) ;;
                *) ALL_DONE=false ;;
              esac
            done
            if [ "$ALL_DONE" = "true" ]; then
              echo "All papers reached terminal status."
              break
            fi
            sleep 30
          done
          if [ "$ALL_DONE" != "true" ]; then
            echo "::warning::Timed out after 45 min waiting for terminal status."
          fi
          # Print the final state of each paper for visibility.
          echo "---"
          echo "Final states:"
          GENERATED=0
          FAILED=0
          for PID in $PAPER_IDS; do
            BODY=$(curl -sf "$API_BASE/api/v1/papers/$PID" \
              -H "X-API-Key: $API_KEY" || echo '{}')
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            STATUS=$(echo "$BODY" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("status",""))' 2>/dev/null || echo "")
            case "$STATUS" in
              candidate|published) GENERATED=$((GENERATED + 1)) ;;
              error|killed|rejected) FAILED=$((FAILED + 1)) ;;
            esac
          done
          echo "summary=Generated $GENERATED, failed $FAILED" >> "$GITHUB_STEP_SUMMARY"

      - name: Re-verify pending claims (fill Verifier coverage gap)
        run: |
          # PR #62: the Verifier LLM consistently leaves ~70% of claims
          # at status='pending' (PRs #50/52/53 documented this). PR #56
          # added /admin/papers/{id}/re-verify and PR #62 added the
          # batch endpoint to process every paper with high pending
          # ratio in one call.
          #
          # Without this step, every paper L2-fails on
          # ``coverage_incomplete CRITICAL`` (production paper
          # apep_1b62de0c was the canonical example: 19 Tier A + 6 B
          # sources, L1 PASS, but L2 failed at 28% verified).
          #
          # Failure here is non-fatal — log and continue so a transient
          # LLM error doesn't block tournaments / promote.
          echo "Re-verifying papers with high pending count..."
          REV=$(curl -s -X POST "$API_BASE/api/v1/admin/papers/re-verify-batch?min_pending_ratio=0.2&limit=10" \
            -H "X-API-Key: $API_KEY" --max-time 1800) || REV="{}"
          echo "$REV" | python3 -m json.tool 2>/dev/null || echo "$REV"
          PROCESSED=$(echo "$REV" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("processed_count", 0))' 2>/dev/null || echo "?")
          echo "Re-verified $PROCESSED paper(s)" >> "$GITHUB_STEP_SUMMARY"

      - name: Review pending papers
        run: |
          echo "Reviewing pending papers..."
          RESPONSE=$(curl -sf -X POST "$API_BASE/api/v1/batch/review-pending" \
            -H "X-API-Key: $API_KEY" \
            --max-time 1800) || { echo "Review call failed"; exit 1; }
          echo "$RESPONSE" | python3 -m json.tool

      - name: Run tournaments
        if: steps.context.outputs.run_tournament == 'true'
        run: |
          echo "Running family tournaments..."
          RESPONSE=$(curl -sf -X POST "$API_BASE/api/v1/batch/tournament" \
            -H "X-API-Key: $API_KEY" \
            --max-time 1800) || { echo "Tournament call failed"; exit 1; }
          echo "$RESPONSE" | python3 -m json.tool

      - name: Promote eligible papers
        run: |
          echo "Promoting eligible papers to candidate..."
          RESPONSE=$(curl -sf -X POST "$API_BASE/api/v1/batch/promote" \
            -H "X-API-Key: $API_KEY" \
            --max-time 300) || { echo "Promote call failed"; exit 1; }
          echo "$RESPONSE" | python3 -m json.tool
