services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ape
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ape_dev_password}
      POSTGRES_DB: ape_replica
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ape -d ape_replica"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://ape:${POSTGRES_PASSWORD:-ape_dev_password}@db:5432/ape_replica
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      APE_API_KEY: ${APE_API_KEY:-}
      APE_ADMIN_KEY: ${APE_ADMIN_KEY:-}
      REGULATIONS_GOV_API_KEY: ${REGULATIONS_GOV_API_KEY:-}
      COURTLISTENER_API_KEY: ${COURTLISTENER_API_KEY:-}
      OPENALEX_EMAIL: ${OPENALEX_EMAIL:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  pgdata:
